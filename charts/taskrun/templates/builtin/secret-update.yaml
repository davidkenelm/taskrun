apiVersion: taskrun.io/v1alpha1
kind: ClusterStepDefinition
metadata:
  name: secret-update
spec:
  schema:
    type: object
    required: [secretName, key]
    properties:
      secretName:
        type: string
      key:
        type: string
      valueFrom:
        type: string
        description: "Template expression referencing upstream step output"
      value:
        type: string
        description: "Literal value (mutually exclusive with valueFrom)"
  outputs:
    - name: updated
      description: "Whether the secret was created or patched"
  authAware: false
