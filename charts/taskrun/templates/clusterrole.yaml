apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "taskrun.fullname" . }}-manager
  labels:
    {{- include "taskrun.labels" . | nindent 4 }}
rules:
  # TaskRun CRD management
  - apiGroups: ["taskrun.io"]
    resources: ["taskruns"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["taskrun.io"]
    resources: ["taskruns/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["taskrun.io"]
    resources: ["taskruns/finalizers"]
    verbs: ["update"]
  # StepDefinition read access
  - apiGroups: ["taskrun.io"]
    resources: ["stepdefinitions", "clusterstepdefinitions"]
    verbs: ["get", "list", "watch"]
  # Job management
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  # Secret/ConfigMap operations (api-native steps)
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "create", "patch"]
  # Rollout restart (api-native step)
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "patch"]
  # Pod log collection
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
