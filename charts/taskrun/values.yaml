replicaCount: 1

image:
  repository: ghcr.io/davidkenelm/taskrun
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

webhook:
  enabled: true
  port: 9443

metrics:
  enabled: true
  port: 8443

healthProbe:
  port: 8081
