# This rule is not used by the project taskrun itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the taskrun.taskrun.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: taskrun
    app.kubernetes.io/managed-by: kustomize
  name: clusterstepdefinition-editor-role
rules:
- apiGroups:
  - taskrun.taskrun.io
  resources:
  - clusterstepdefinitions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - taskrun.taskrun.io
  resources:
  - clusterstepdefinitions/status
  verbs:
  - get
