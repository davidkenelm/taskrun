---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-taskrun-taskrun-io-v1alpha1-taskrun
  failurePolicy: Fail
  name: vtaskrun-v1alpha1.kb.io
  rules:
  - apiGroups:
    - taskrun.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - taskruns
  sideEffects: None
